<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Bible Journaling Together</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="app">

    <!-- LEFT: BIBLE -->
    <div class="bible">

      <h1>창세기 1장</h1>

      <div class="verse" onclick="selectVerse('1')">1 태초에 하나님이 천지를 창조하시니라</div>
      <div class="verse" onclick="selectVerse('2')">2 땅이 혼돈하고 공허하며</div>
      <div class="verse" onclick="selectVerse('3')">3 빛이 있으라 하시니 빛이 있었고</div>
      <div class="verse" onclick="selectVerse('4')">4 하나님이 보시기에 좋았더라</div>

    </div>

    <!-- RIGHT: COMMENTS -->
    <div class="comments">

      <h2>댓글</h2>
      <div id="selectedVerse">절을 선택하세요</div>

      <div id="commentList"></div>

      <input id="commentInput" placeholder="묵상 작성..." />
      <button onclick="addComment()">등록</button>

    </div>

  </div>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="script.js"></script>

</body>
</html>
