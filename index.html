<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="성경을 책처럼 넘기며 읽고, 원하는 장절을 바로 검색하는 Bible Journaling Together 성경 리더" />
  <title>Bible Journaling Together | 성경 리더</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <a class="brand" href="#">
      <span class="brand-icon">✦</span>
      <span>Bible Journaling Together</span>
    </a>
    <form id="search-form" class="search-form" autocomplete="off">
      <label class="sr-only" for="passage-search">성경 구절 검색</label>
      <input id="passage-search" type="search" placeholder="예: 요한복음 3:16, 창세기 1장, 시편 23편" />
      <button type="submit">펴기</button>
    </form>
  </header>

  <main class="reader-shell">
    <aside class="sidebar" aria-label="성경 선택">
      <div class="sidebar-card">
        <p class="eyebrow">Bible Reader</p>
        <h1>성경책을 넘기듯 읽어보세요.</h1>
        <p>책, 장, 절을 고르거나 검색창에 원하는 구절을 입력하면 자동으로 펼쳐집니다.</p>
      </div>

      <div class="control-group">
        <label for="book-select">성경</label>
        <select id="book-select"></select>
      </div>
      <div class="control-row">
        <div class="control-group">
          <label for="chapter-select">장</label>
          <select id="chapter-select"></select>
        </div>
        <div class="control-group">
          <label for="verse-select">절</label>
          <select id="verse-select"></select>
        </div>
      </div>

      <div class="quick-links" aria-label="빠른 이동">
        <button type="button" data-ref="창세기 1:1">창 1:1</button>
        <button type="button" data-ref="시편 23:1">시 23</button>
        <button type="button" data-ref="요한복음 3:16">요 3:16</button>
        <button type="button" data-ref="로마서 8:28">롬 8:28</button>
      </div>

      <p class="data-note">
        현재는 데모용 일부 본문만 포함되어 있습니다. 합법적으로 사용 가능한 성경 번역 JSON을 연결하면 전체 성경 리더로 확장됩니다.
      </p>
    </aside>

    <section class="book-stage" aria-live="polite">
      <div class="book-toolbar">
        <button id="prev-button" class="nav-button" type="button" aria-label="이전 장">← 이전 장</button>
        <div>
          <p id="current-book" class="current-book">-</p>
          <h2 id="current-title">-</h2>
        </div>
        <button id="next-button" class="nav-button" type="button" aria-label="다음 장">다음 장 →</button>
      </div>

      <article id="book" class="book" tabindex="0" aria-label="성경 본문">
        <button id="page-left" class="page-turn left" type="button" aria-label="이전 장으로 넘기기"></button>
        <div class="page page-left">
          <div class="page-inner">
            <p class="page-label">Bible</p>
            <div id="left-page-content" class="verses"></div>
          </div>
        </div>
        <div class="page page-right">
          <div class="page-inner">
            <p class="page-label">Together</p>
            <div id="right-page-content" class="verses"></div>
          </div>
        </div>
        <button id="page-right" class="page-turn right" type="button" aria-label="다음 장으로 넘기기"></button>
      </article>

      <div id="message" class="message" role="status"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
